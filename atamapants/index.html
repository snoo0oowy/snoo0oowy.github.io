<!DOCTYPE html>
<html lang="zh">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>思想气泡照相馆</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="page">
      <main class="darkroom" data-template="preview">
        <div class="preview-card" id="preview-card">
          <div class="preview-frame">
            <div class="preview-titlebar">
              <div class="traffic-lights">
                <span class="dot dot-close"></span>
                <span class="dot dot-minimize"></span>
                <span class="dot dot-maximize"></span>
              </div>
            </div>
            <div class="preview-body"></div>
          </div>
          <canvas id="preview-canvas"></canvas>
        </div>

        <section class="tray">
          <div class="tool">
            <span class="tool-tag">贴照片</span>
            <input type="file" id="file-input" accept="image/*" />
          </div>

          <div class="tool">
            <span class="tool-tag">图片大小</span>
            <input type="range" id="img-slider" min="0.5" max="3" value="1" step="0.01" />
          </div>

          <div class="tool">
            <span class="tool-tag">气泡大小</span>
            <input type="range" id="size-slider" min="0.3" max="2" value="1" step="0.01" />
          </div>

          <div class="tool">
            <span class="tool-tag">写点心里话</span>
            <input type="text" id="text-input" placeholder="此刻脑子里转的那句话…" maxlength="45" />
          </div>

          <div class="tool">
            <button id="save-btn">保存图片</button>
          </div>
        </section>
      </main>

      <footer>纯前端生成 · 图片不会上传</footer>
    </div>

    <script src="sketch.js"></script>
  </body>
</html>
